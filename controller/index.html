<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mac Remote Controller</title>
  <style>
    :root {
      --bg: #101823;
      --card: #192538;
      --text: #f3f6fb;
      --accent: #43d787;
      --accent-2: #62c5ff;
      --danger: #ff6b6b;
    }
    body {
      margin: 0;
      font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 10% 10%, #1f2f47 0%, var(--bg) 55%);
      color: var(--text);
    }
    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: color-mix(in oklab, var(--card) 90%, black);
      border: 1px solid #30455f;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    input, button, textarea {
      width: 100%;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #3a5271;
      padding: 10px;
      box-sizing: border-box;
    }
    input, textarea {
      background: #102033;
      color: var(--text);
    }
    button {
      background: linear-gradient(130deg, var(--accent), var(--accent-2));
      color: #0a1420;
      border: 0;
      font-weight: 700;
    }
    button.secondary {
      background: #30455f;
      color: var(--text);
    }
    button.danger {
      background: var(--danger);
      color: white;
    }
    #screen {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #3a5271;
      touch-action: none;
      background: black;
    }
    #status {
      font-size: 14px;
      color: #cbe3ff;
      min-height: 20px;
    }
    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Mac Remote Controller</h1>
      <div class="row">
        <input id="relayWs" value="ws://127.0.0.1:8787" placeholder="Relay WS URL" />
        <input id="code" placeholder="6-digit code from Mac" maxlength="6" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" class="secondary">Disconnect</button>
      </div>
      <p id="status"></p>
    </section>

    <section class="card">
      <img id="screen" alt="Mac screen stream" />
      <div class="row" style="margin-top:10px;">
        <button id="doubleClickBtn">Double Click Center</button>
        <button id="scrollUpBtn" class="secondary">Scroll Up</button>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="scrollDownBtn" class="secondary">Scroll Down</button>
        <button id="escBtn" class="danger">ESC</button>
      </div>
    </section>

    <section class="card">
      <textarea id="textInput" rows="3" placeholder="Type text to send to Mac"></textarea>
      <button id="sendTextBtn" style="margin-top:10px;">Send Text</button>
    </section>
  </main>

  <script>
    let ws = null;
    const statusEl = document.getElementById("status");
    const screenEl = document.getElementById("screen");

    const setStatus = (msg) => (statusEl.textContent = msg);

    const send = (payload) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify(payload));
    };

    document.getElementById("connectBtn").onclick = () => {
      const relay = document.getElementById("relayWs").value.trim().replace(/\/$/, "");
      const code = document.getElementById("code").value.trim();
      if (!relay || code.length !== 6) {
        setStatus("Enter relay URL and 6-digit code.");
        return;
      }

      ws = new WebSocket(`${relay}/ws/phone/${code}`);
      ws.onopen = () => setStatus("Connected to relay. Waiting for frames...");
      ws.onclose = () => setStatus("Disconnected.");
      ws.onerror = () => setStatus("Connection error.");
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "frame") {
          screenEl.src = msg.image;
          return;
        }
        if (msg.type === "status") setStatus(msg.message);
      };
    };

    document.getElementById("disconnectBtn").onclick = () => {
      if (ws) ws.close();
      ws = null;
      setStatus("Disconnected.");
    };

    function normalizedFromTap(ev) {
      const rect = screenEl.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width;
      const y = (ev.clientY - rect.top) / rect.height;
      return {
        x: Math.max(0, Math.min(1, x)),
        y: Math.max(0, Math.min(1, y)),
      };
    }

    screenEl.addEventListener("click", (ev) => {
      const p = normalizedFromTap(ev);
      send({ type: "click", x: p.x, y: p.y, button: "left" });
    });

    screenEl.addEventListener("mousemove", (ev) => {
      if (ev.buttons === 0) return;
      const p = normalizedFromTap(ev);
      send({ type: "move", x: p.x, y: p.y });
    });

    document.getElementById("doubleClickBtn").onclick = () => send({ type: "double_click", x: 0.5, y: 0.5 });
    document.getElementById("scrollUpBtn").onclick = () => send({ type: "scroll", amount: 250 });
    document.getElementById("scrollDownBtn").onclick = () => send({ type: "scroll", amount: -250 });
    document.getElementById("escBtn").onclick = () => send({ type: "key", key: "esc" });

    document.getElementById("sendTextBtn").onclick = () => {
      const text = document.getElementById("textInput").value;
      if (!text.trim()) return;
      send({ type: "type_text", text });
      document.getElementById("textInput").value = "";
    };
  </script>
</body>
</html>
